<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Demo Chat TPM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="frame" aria-label="TPM Buddy chat">
    <header class="header">
      <span class="avatar" aria-hidden="true">🤖</span>
      <div class="header-text">
        <div class="title">TPM Buddy</div>
        <div class="subtitle">A tiny demo of an agentic SDLC</div>
      </div>
      <button id="clear" class="clear" type="button" aria-label="Clear conversation">Clear</button>
    </header>

    <section id="thread" class="thread" aria-live="polite" aria-label="Conversation"></section>

    <div id="presets" class="presets" aria-label="Quick prompts">
      <button type="button" class="preset" data-prompt="Status of the release?">📦 Status of the release?</button>
      <button type="button" class="preset" data-prompt="Any blockers?">🚧 Any blockers?</button>
      <button type="button" class="preset" data-prompt="Roadmap update please">🗺️ Roadmap update</button>
      <button type="button" class="preset" data-prompt="Standup summary">☕ Standup summary</button>
      <button type="button" class="preset" data-prompt="How are we doing on OKRs?">🎯 OKR check-in</button>
    </div>

    <form id="composer" class="composer" autocomplete="off">
      <input
        id="input"
        class="input"
        type="text"
        placeholder="Ask your TPM buddy anything…"
        aria-label="Type your message"
      />
      <button type="submit" class="send">Send</button>
    </form>
  </main>

<script type="module" src="app.js"></script>
</body>
</html>
